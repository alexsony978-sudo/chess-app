<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Chess App</title>

<link rel="stylesheet"
href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

<style>
body {
  text-align: center;
  background: #111;
  color: white;
  font-family: Arial;
}
#board {
  width: 350px;
  margin: 20px auto;
}
button {
  padding: 10px;
  margin: 10px;
}
</style>
</head>

<body>

<h1>Play Against Stockfish ♟️</h1>

<button onclick="undoMove()">Undo</button>

<div id="board"></div>
<p id="status">Your move</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
const game = new Chess();
const statusText = document.getElementById("status");

const board = Chessboard('board', {
  draggable: true,
  position: 'start',
  orientation: 'white',
  onDragStart: onDragStart,
  onDrop: onDrop
});

// =======================
// PLAYER CONTROL
// =======================
function onDragStart(source, piece) {
  if (game.game_over()) return false;
  if (piece.search(/^b/) !== -1) return false;
}

// =======================
// PLAYER MOVE
// =======================
function onDrop(source, target) {

  const move = game.move({
    from: source,
    to: target,
    promotion: 'q'
  });

  if (move === null) return 'snapback';

  board.position(game.fen());
  statusText.innerText = "AI thinking...";

  getBestMove();
}

// =======================
// API ENGINE (REAL)
// =======================
function getBestMove() {

  fetch("https://lichess.org/api/cloud-eval?fen=" + game.fen())
    .then(res => res.json())
    .then(data => {

      if (!data.pvs || data.pvs.length === 0) {
        statusText.innerText = "No move found";
        return;
      }

      const best = data.pvs[0].moves.split(" ")[0];

      game.move({
        from: best.substring(0,2),
        to: best.substring(2,4),
        promotion: 'q'
      });

      board.position(game.fen());
      statusText.innerText = "Your move";
    })
    .catch(() => {
      statusText.innerText = "API error";
    });
}

// =======================
// UNDO
// =======================
function undoMove() {
  game.undo();
  game.undo();
  board.position(game.fen());
  statusText.innerText = "Move undone";
}
</script>

</body>
</html>
