<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Play Against Stockfish</title>

  <!-- Chessboard CSS -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.css">

  <style>
    body {
      text-align: center;
      background: black;
      color: white;
      font-family: Arial;
    }
    #board {
      width: 350px;
      margin: 20px auto;
    }
    button {
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>Play Against Stockfish ♟️</h1>
<button onclick="undoMove()">↩️ Undo</button>

<div id="board"></div>
<p id="status">Your move</p>

<!-- IMPORTANT ORDER -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.js"></script>

<script>
  const game = new Chess();

  const board = Chessboard('board', {
    draggable: true,
    position: 'start',
    onDrop: onDrop
  });

  function onDrop(source, target) {
    const move = game.move({
      from: source,
      to: target,
      promotion: 'q'
    });

    if (move === null) return 'snapback';

    setTimeout(makeMove, 300);
  }

  function makeMove() {
    const moves = game.moves();
    if (moves.length === 0) return;

    const move = moves[Math.floor(Math.random() * moves.length)];
    game.move(move);
    board.position(game.fen());
  }

  function undoMove() {
    game.undo();
    game.undo();
    board.position(game.fen());
  }
</script>

</body>
</html>
