<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Against Stockfish ♟️</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js" integrity="sha384-8Vi8VHwnV3f3Y6e4f8z6L8j8wL8j8j8j8j8j8j8j8j8j8j8j8j8j8j8j8j8j8j8" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
        
        :root {
            --primary: #4ade80;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #111827;
            color: #f1f5f9;
            font-family: 'Inter', system_ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        header {
            text-align: center;
            padding: 30px 20px 20px;
            width: 100%;
            max-width: 600px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin: 0;
        }
        
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 620px;
            padding: 0 20px;
        }
        
        #board-container {
            background: #1e2937;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        #board {
            width: 480px;
            max-width: 100%;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #334155;
            color: #f1f5f9;
            border: none;
            padding: 14px 28px;
            border-radius: 9999px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        button:hover {
            background: #64748b;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .status {
            background: #1e2937;
            padding: 16px 24px;
            border-radius: 9999px;
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            min-width: 280px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .thinking .status-dot {
            background: #facc15;
        }
        
        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #64748b;
            text-align: center;
        }
        
        .highlight {
            box-shadow: inset 0 0 0 5px #4ade80 !important;
        }
        
        .legal-move::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: rgba(74, 222, 128, 0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }
        
        .square {
            position: relative;
        }
    </style>
</head>
<body>
    <header>
        <h1>Play Against Stockfish ♟️</h1>
        <p class="subtitle">You are White • Stockfish (Skill 20) is Black</p>
    </header>

    <div class="main">
        <div id="board-container">
            <div id="board"></div>
        </div>

        <div class="status" id="status">
            <span class="status-dot"></span>
            <span id="status-text">Your move • White to play</span>
        </div>

        <div class="controls">
            <button id="undo-btn">
                ↩️ Undo Move
            </button>
            <button id="new-game-btn">
                ♟️ New Game
            </button>
            <button id="flip-btn">
                🔄 Flip Board
            </button>
        </div>
    </div>

    <div class="footer">
        Single-file HTML • Powered by chess.js + chessboard.js + Stockfish.js (via CDN)<br>
        Fully offline-capable once loaded • Grandmaster-level AI
    </div>

    <script>
        // Global variables
        let board = null;
        let game = new Chess();
        let stockfish = null;
        let playerColor = 'w';
        let isGameOver = false;
        let engineThinking = false;
        let selectedSquare = null;
        let currentOrientation = 'white';

        // Helper: update status text
        function updateStatus() {
            const statusEl = document.getElementById('status-text');
            const statusContainer = document.getElementById('status');
            
            if (isGameOver) {
                let result = '';
                if (game.in_checkmate()) {
                    result = game.turn() === 'w' ? 'Checkmate! Black wins' : 'Checkmate! White wins';
                } else if (game.in_draw()) {
                    result = 'Draw';
                } else if (game.in_stalemate()) {
                    result = 'Stalemate';
                }
                statusEl.textContent = result;
                statusContainer.classList.remove('thinking');
                return;
            }
            
            if (engineThinking) {
                statusContainer.classList.add('thinking');
                statusEl.innerHTML = `Stockfish thinking<span style="display:inline-block;animation:ellipsis 1.2s steps(4,end) infinite">.</span>`;
                return;
            }
            
            statusContainer.classList.remove('thinking');
            if (game.turn() === playerColor) {
                statusEl.textContent = 'Your move • ' + (game.in_check() ? 'Check!' : 'White to play');
            } else {
                statusEl.textContent = 'Stockfish\'s move • Black to play';
            }
        }

        // Highlight legal moves
        function highlightLegalMoves(square) {
            // Remove old highlights
            $('.square').removeClass('highlight');
            $('.square').removeClass('legal-move');
            
            if (!square) return;
            
            const moves = game.moves({ square: square, verbose: true });
            moves.forEach(move => {
                const targetSquare = \( (`#board .square[data-square=" \){move.to}"]`);
                if (targetSquare.length) {
                    // For empty squares show dot, for captures show ring
                    if (game.get(move.to)) {
                        targetSquare.addClass('highlight');
                    } else {
                        targetSquare.addClass('legal-move');
                    }
                }
            });
            
            // Highlight selected square
            const sourceSquare = \( (`#board .square[data-square=" \){square}"]`);
            if (sourceSquare.length) sourceSquare.addClass('highlight');
        }

        // Handle square click (click-to-move with legal move preview)
        function handleSquareClick(square) {
            if (isGameOver || engineThinking || game.turn() !== playerColor) return;
            
            const piece = game.get(square);
            
            // If we already have a selected piece
            if (selectedSquare) {
                // Try to make the move
                const move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q' // always promote to queen
                });
                
                if (move) {
                    // Valid move
                    board.position(game.fen());
                    highlightLegalMoves(null);
                    selectedSquare = null;
                    updateStatus();
                    if (!game.game_over()) {
                        makeEngineMove();
                    } else {
                        isGameOver = true;
                        updateStatus();
                    }
                } else {
                    // Invalid move - maybe select new piece
                    highlightLegalMoves(null);
                    selectedSquare = null;
                    
                    // If clicked on own piece, select it
                    if (piece && piece.color === playerColor) {
                        selectedSquare = square;
                        highlightLegalMoves(square);
                    }
                }
            } else {
                // No piece selected yet
                if (piece && piece.color === playerColor) {
                    selectedSquare = square;
                    highlightLegalMoves(square);
                }
            }
        }

        // Make engine move using Stockfish
        function makeEngineMove() {
            if (!stockfish || isGameOver) return;
            
            engineThinking = true;
            updateStatus();
            
            // Send current position to Stockfish
            stockfish.postMessage(`position fen ${game.fen()}`);
            
            // Ask for best move (depth 18 + Skill Level 20 = very strong GM play)
            stockfish.postMessage('go depth 18');
        }

        // Process Stockfish response
        function handleStockfishMessage(event) {
            const line = event.data;
            
            // Look for bestmove
            if (line.startsWith('bestmove')) {
                engineThinking = false;
                
                const parts = line.split(' ');
                const bestMove = parts[1];
                
                if (!bestMove || bestMove === '(none)') {
                    updateStatus();
                    return;
                }
                
                // Parse move (e.g. e7e8q)
                const from = bestMove.substring(0, 2);
                const to = bestMove.substring(2, 4);
                let promotion = bestMove.length > 4 ? bestMove[4] : null;
                
                // Make the move in our game
                const moveObj = {
                    from: from,
                    to: to,
                    promotion: promotion || 'q'
                };
                
                const move = game.move(moveObj);
                
                if (move) {
                    board.position(game.fen());
                    updateStatus();
                    
                    if (game.game_over()) {
                        isGameOver = true;
                        updateStatus();
                    }
                }
            }
        }

        // Initialize everything
        function initChessApp() {
            // Create Stockfish worker
            stockfish = new Worker('https://cdn.jsdelivr.net/npm/stockfish@16.0.0/src/stockfish.min.js');
            
            // Initialize Stockfish with UCI protocol
            stockfish.postMessage('uci');
            stockfish.postMessage('setoption name Skill Level value 20');
            stockfish.postMessage('setoption name UCI_Chess960 value false');
            stockfish.postMessage('isready');
            
            // Listen for engine responses
            stockfish.onmessage = handleStockfishMessage;
            
            // Chessboard configuration
            const config = {
                draggable: false,           // We use click-to-move instead
                position: 'start',
                orientation: currentOrientation,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: function() { return false; } // Disabled because we use clicks
            };
            
            // Create board
            board = Chessboard('board', config);
            
            // Make squares clickable by adding data attributes and event listeners
            // chessboard.js renders squares with class "square" and we can attach via delegation
            setTimeout(() => {
                $('#board').on('click', '.square', function() {
                    // Extract algebraic notation from square element
                    // chessboard.js 1.0.0 uses internal square classes but we can get position from style or use a better method
                    
                    // Better way: use board's internal square map (exposed via jQuery)
                    const squareEl = $(this);
                    // Find the square name by checking which child has the piece or by position
                    // Since squares are in fixed order, we use the library's squareEls if accessible
                    
                    // Fallback robust method: the board container children are in order a8-h8 ... a1-h1
                    const allSquares = $('#board .square');
                    const index = allSquares.index(this);
                    const files = 'abcdefgh';
                    const rank = 8 - Math.floor(index / 8);
                    const file = files[index % 8];
                    const square = file + rank;
                    
                    handleSquareClick(square);
                });
                
                // Add data-square attributes to all squares for easy identification
                const squares = $('#board .square');
                const files = 'abcdefgh';
                let idx = 0;
                squares.each(function() {
                    const rank = 8 - Math.floor(idx / 8);
                    const file = files[idx % 8];
                    $(this).attr('data-square', file + rank);
                    idx++;
                });
            }, 300);
            
            // Button handlers
            $('#undo-btn').on('click', function() {
                if (engineThinking || isGameOver) return;
                
                // Undo two half-moves (player + engine) if possible
                if (game.history().length >= 2) {
                    game.undo();
                    game.undo();
                    board.position(game.fen());
                    updateStatus();
                } else if (game.history().length === 1) {
                    game.undo();
                    board.position(game.fen());
                    updateStatus();
                }
            });
            
            $('#new-game-btn').on('click', function() {
                if (confirm('Start a new game?')) {
                    game.reset();
                    isGameOver = false;
                    engineThinking = false;
                    selectedSquare = null;
                    board.position('start');
                    updateStatus();
                    highlightLegalMoves(null);
                }
            });
            
            $('#flip-btn').on('click', function() {
                currentOrientation = currentOrientation === 'white' ? 'black' : 'white';
                board.flip();
            });
            
            // Initial status
            updateStatus();
            
            console.log('%c✅ Chess app loaded successfully! Stockfish is ready.', 'color:#4ade80;font-weight:bold');
        }
        
        // Start the app when page is ready
        $(document).ready(function() {
            initChessApp();
        });
    </script>
</body>
</html>
